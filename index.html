<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="食材の価格・内容量・使用量から一人前の食費を自動計算。複数食材にも対応した無料の食費計算ツール。自炊・節約・家計管理に。">
  <meta name="google-site-verification" content="JUQzpSWXDlmY2dKkkwU9a716EybnjabIKuK38MrQCgc" />
  <title>その一皿、いくら？｜食費計算・一人前コスト計算ツール</title>
  <link rel="stylesheet" href="style.css">
</head>

<!-- デバッグon -->
<!-- <body class="debug"> -->
<!-- デバッグoff -->
<body>

  <!-- タイトル -->
<div id="title-area">
  <h1>その一皿、いくら？</h1>
  <p>食材の価格・内容量・使用量を入力すると一人前の費用がわかります。</p>
  <p>食費を厳密に管理したい、節約を頑張るあなたに。</p>
</div>

<!-- 本文 -->
<div class="container">
  <!-- 人前 -->
  <div class="servings">
    レシピ：
    <input type="text" id="people" inputmode="decimal">
    人前
  </div>

  <!-- ヘッダー -->
  <div class="header">
    <div class="name">食材名</div>
    <div class="price">価格</div>
    <div class="total">内容量</div>
    <div class="used">使用量</div>
  </div>

  <!-- 食材リスト -->
  <div id="ingredient-list"></div>

  <!-- 追加ボタン -->
  <button class="add-btn" onclick="addRow()">＋ 食材を追加する</button>

  <br>

  <!-- 計算ボタン -->
  <button class="calc-btn" onclick="calculate()">計算する</button>

  <!-- 結果 -->
  <div class="result" id="result"></div>

</div>

<script>
document.getElementById("people").addEventListener("blur", function() {
  formatInput(this);
});

function normalizeNumber(value) {
  value = value.replace(/[０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 65248)
  );
  value = value.replace(/,/g, "");
  return value;
}

function createRow() {
  const row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <button class="delete-btn">×</button>
    <input class="name" placeholder="例：卵">
    <input class="price" inputmode="decimal" placeholder="298">
    <input class="total" inputmode="decimal" placeholder="10">
    <input class="used" inputmode="decimal" placeholder="1">
  `;

  // 数値項目にイベント付与
  const inputs = row.querySelectorAll(".price, .total, .used");

  inputs.forEach(input => {
    input.addEventListener("blur", function() {
      formatInput(this);
    });
  });

  //削除処理
  row.querySelector(".delete-btn").addEventListener("click", function() {
    const list = document.getElementById("ingredient-list");

    row.remove();

    // 行が0なら1行追加
    if (list.children.length === 0) {
      addRow();
    }
  });

  return row;
}

function addRow() {
  const list = document.getElementById("ingredient-list");
  const newRow = createRow();

  list.appendChild(newRow);
}

function calculate() {
  let hasError = false;
  let firstErrorEl = null;

  // 人前
  const peopleEl = document.getElementById("people");
  const peopleVal = normalizeNumber(peopleEl.value);
  const people = Number(peopleVal);

  peopleEl.classList.remove("error");

  //  人前チェック 0以下の数字をはじく
  if (!people || people <= 0) {
    peopleEl.classList.add("error");
    hasError = true;
    if (!firstErrorEl) firstErrorEl = peopleEl;
  }

  const rows = document.querySelectorAll("#ingredient-list .row");
  let totalCost = 0;
  let breakdown = [];

  rows.forEach(row => {
    const priceEl = row.querySelector(".price");
    const totalEl = row.querySelector(".total");
    const usedEl = row.querySelector(".used");

    const inputs = [priceEl, totalEl, usedEl];

    inputs.forEach(el => el.classList.remove("error"));

    const price = Number(normalizeNumber(priceEl.value));
    const total = Number(normalizeNumber(totalEl.value));
    const used = Number(normalizeNumber(usedEl.value));

    //  価格チェック 0以下の数字をはじく
    if (!price || price <= 0) {
      priceEl.classList.add("error");
      hasError = true;
      if (!firstErrorEl) firstErrorEl = priceEl;
    }

    //  内容量チェック 0以下の数字をはじく
    if (!total || total <= 0) {
      totalEl.classList.add("error");
      hasError = true;
      if (!firstErrorEl) firstErrorEl = totalEl;
    }

    //  使用量チェック 0以下の数字をはじく
    if (!used || used <= 0) {
      usedEl.classList.add("error");
      hasError = true;
      if (!firstErrorEl) firstErrorEl = usedEl;
    }

    if (!hasError) {
      let name = row.querySelector(".name").value || "（名無しの食材）";
      name += "：";
      const cost = (price / total) * used;
      breakdown.push({ name, cost });
      totalCost += cost;
    }
  });

  // エラー時
  if (hasError) {
    document.getElementById("result").innerText =
      "0より大きい数字を入力してください";

    if (firstErrorEl) {
      firstErrorEl.focus();
    }

    return;
  }

  // 正常時
  const resultEl = document.getElementById("result");
  let html = "";

  // 内訳
  breakdown.sort((a, b) => b.cost - a.cost); // 高い順にソート
  breakdown.forEach(item => {
    const ratio = (item.cost / totalCost) * 100;
    // html += `${item.name}：${item.cost.toFixed(1)}円（${ratio.toFixed(1)}%）<br>`;
  html += `
    <div class="result-row">
      <span class="name">${item.name}</span>
      <span class="value">${item.cost.toFixed(0)}円</span>
      <span class="ratio">（${ratio.toFixed(1)}%）</span>
    </div>
  `;
  });

  // 区切り
  html += "<hr>";

  // 合計
  html += `
    <div class="result-row">
      <span class="name">合計：</span>
      <span class="value">${totalCost.toFixed(0)}円</span>
      <span class="ratio"></span>
    </div>
  `;

  // 一人前
  html += `
    <div class="result-row perPerson">
      <span class="name">一人前：</span>
      <span class="value">${(totalCost / people).toFixed(0)}円</span>
      <span class="ratio"></span>
    </div>
  `;

  resultEl.innerHTML = html;
}

function validateInput(el) {
  const value = normalizeNumber(el.value);

  // 未入力
  if (value === "") return false;

  // 数値チェック
  if (!/^[0-9]+$/.test(value) || Number(value) < 1) return false;

  return true;
}

function formatInput(el) {
  const value = normalizeNumber(el.value);

  if (/^[0-9]+$/.test(value)) {
    el.value = Number(value).toLocaleString();
  }
}

// 初期行
addRow();
</script>

</body>
</html>
