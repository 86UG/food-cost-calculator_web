<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="食材の価格・内容量・使用量から一人前の食費を自動計算。複数食材にも対応した無料の食費計算ツール。自炊・節約・家計管理に。">
    <meta name="google-site-verification" content="JUQzpSWXDlmY2dKkkwU9a716EybnjabIKuK38MrQCgc" />
    <title>その一皿、いくら？｜食費計算・一人前コスト計算ツール</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="http://fonts.googleapis.com/earlyaccess/notosansjp.css">
  </head>

  <!-- デバッグon -->
  <!-- <body class="debug"> -->
  <!-- デバッグoff -->
  <body>

      <!-- タイトル -->
    <div id="title-area">
      <h1>その一皿、いくら？</h1>
      <p>食材の価格・内容量・使用量を入力すると一人前の費用がわかります。</p>
      <!-- <p>食費を厳密に管理したい、節約を頑張るあなたに。</p> -->
    </div>

    <!-- 本文 -->
    <div class="container">
      <!-- 入力パネル -->
      <section class="panel">
        <!-- 人前 -->
        <div class="servings">
          レシピ：
          <input type="text" id="people" inputmode="decimal">
          人前
        </div>

        <!-- ヘッダー -->
        <div class="header">
          <div class="name">食材名</div>
          <div class="price">価格</div>
          <div class="total">内容量</div>
          <div class="used">使用量</div>
        </div>

        <!-- 食材リスト -->
        <div id="ingredient-row"></div>

        <!-- 追加ボタン -->
        <button class="btn-secondary add-btn" onclick="addRow()">＋ 食材を追加</button>

        <br>

        <!-- 計算ボタン -->
        <button class="btn-primary calc-btn" onclick="calculate()">計算</button>
      </section>
        
      <!-- 結果パネル -->
      <section class="panel">
        <div class="result" id="result"></div>
      </section>
      
      <!-- 一覧パネル -->
      <section class="panel">
        <h2>登録済み食材</h2>
        <div class="header">
          <div class="name">食材名</div>
          <div class="price">価格</div>
          <div class="total">内容量</div>
        </div>
        <div id="ingredient-list"></div>
      </section>
    </div>

    <script src="main.js" defer></script>

  </body>
</html>
