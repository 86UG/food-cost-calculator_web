<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食費計算ツール</title>
  <style>
    p {
      margin: 0px 0px 0px 0px;
    }

    body {
      font-family: "Helvetica Neue",
        Arial,
        "Hiragino Kaku Gothic ProN",
        "Hiragino Sans",
        "Noto Sans JP",
        sans-serif;
    }
    
    input {
      padding: 1px;
      font-size: 16px;
      margin: 0px 0px 0px 0px;
    }
    
    .TITLE_AREA {/*タイトル*/
      margin: 20px 0px 20px 0px;
    }
    
    .TITLE_AREA h2 {/*タイトル*/
      margin: 0px 0px 0px 0px;
    }

    .BOX {
      border: 2px solid #333;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 8px;
      width: 100%;
      max-width: 320px;
    }

    .BOX h3 {/*① 食材の情報, ② 使った量, 結果*/
      margin: 0px 0px 0px 0px;
    }
    .BOX p {/*① 食材の情報, ② 使った量, 結果*/
      margin: 0px 0px 5px 0px;
    }

    .desc {
      font-size: 13px;
      color: #666;
      margin: 0px 0px 8px 0px;
    }

    .error {
      color: red;
      font-size: 12px;
      min-height: 16px;
    }

    .RESULT_AREA {
      display: flex;
      align-items: center;
      gap: 15px;  /* ボタンと結果の間の余白 */
    }

    #result {
      min-width: 120px;   /* 横幅確保 */
      min-height: 28px;   /* ←これが本命（高さ固定） */
      display: flex;
      align-items: center;
    }

    #button_calc {/*計算ボタン*/
      padding: 8px 16px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="TITLE_AREA">
  <h2>その一皿、いくら？｜食費計算ツール</h2>
  <p class="desc">食費を厳密に管理したい、自炊を頑張るあなたに。気ままに更新します。</p>
</div>

<div class="BOX">
  <h3>① 食材の情報</h3>
  <p class="desc">購入したときの価格と内容量を入力</p>

  <p>価格（円）</p>
  <input type="text" id="price" placeholder="例：298">
  <div id="priceError" class="error"></div>

  <p>内容量（g、mL、個など）</p>
  <input type="text" id="total" placeholder="例：10">
  <div id="totalError" class="error"></div>
</div>

<div class="BOX">
  <h3>② 使う量</h3>
  <p class="desc">レシピで使う量と想定人数を入力</p>

  <p>使用量（g、mL、個など）</p>
  <input type="text" id="used" placeholder="例：3">
  <div id="usedError" class="error"></div>
  
  <p>人前</p>
  <input type="text" id="people" placeholder="例：2">
  <div id="peopleError" class="error"></div>
</div>

<div class="RESULT_AREA">
  <button onclick="calc()" id="button_calc">計算する</button>
  <h3 id="result"></h3>
</div>

<script>
const fields = ["price", "total", "used", "people"];

// 各inputにイベント追加（フォーカス外れた時）
fields.forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener("blur", () => {
    validateField(id);
    formatNumber(id);
  });
});

//入力形式が適切か判定する
//未入力or数値じゃないor1未満
function validateField(id) {
  const el = document.getElementById(id);
  const errorEl = document.getElementById(id + "Error");
  const raw = el.value;
  const value = normalizeNumber(raw);

  el.style.border = "";
  errorEl.innerText = "";

  // 未入力
  if (value === "") {
    el.style.border = "2px solid red";
    errorEl.innerText = "未入力です！";
    return false;
  }

const num = Number(value);

// 数字チェック
if (!/^[0-9]+$/.test(value) || num < 1) {
  el.style.border = "2px solid red";
  errorEl.innerText = "入力できるのは1以上の数です";
  return false;
}

  return true;
}

//1食あたりの費用を計算
function calc() {
  let isValid = true;

  // 全項目チェック
  fields.forEach(id => {
    if (!validateField(id)) {
      isValid = false;
    }
  });

  // エラーがあれば計算しない
  if (!isValid) {
    document.getElementById("result").innerText = "";
    return;
  }

  const price = Number(document.getElementById("price").value.replace(/,/g, ""));
  const total = Number(document.getElementById("total").value.replace(/,/g, ""));
  const used = Number(document.getElementById("used").value.replace(/,/g, ""));
  const people = Number(document.getElementById("people").value.replace(/,/g, ""));

  const cost = (price / total) * used / people;

  document.getElementById("result").innerText =
    "一人前：" + Number(cost.toFixed(1)).toLocaleString() + "円";
}

//入力欄をコンマ区切りにする
function formatNumber(id) {
  const el = document.getElementById(id);
  let value = normalizeNumber(el.value);

  if (!value || isNaN(value)) return;

  el.value = Number(value).toLocaleString();
}

//入力成型
function normalizeNumber(value) {
  // 全角→半角
  value = value.replace(/[０-９]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 65248)
  );

  // カンマ削除
  value = value.replace(/,/g, "");

  return value;
}
</script>

</body>
</html>
